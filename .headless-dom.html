    /* ═══════════════════════════════════════════════════════════════
       GLOBAL RESET & BASE
       ═══════════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Primary Colors */
      --color-bg: #050508;
      --color-bg-elevated: #0a0a10;
      --color-bg-card: rgba(10, 12, 22, 0.92);
      
      /* Accent Colors */
      --color-primary: #00d4ff;
      --color-secondary: #8b5cf6;
      --color-energy: #ff6b35;
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-danger: #ef4444;
      --color-gold: #ffd700;
      
      /* Text Colors */
      --color-text: #f1f5f9;
      --color-text-muted: #94a3b8;
      --color-text-dim: #64748b;
      
      /* Border & Shadow */
      --border-subtle: rgba(148, 163, 184, 0.12);
      --border-accent: rgba(0, 212, 255, 0.25);
      --shadow-glow: 0 0 30px rgba(0, 212, 255, 0.15);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
      
      /* Animation */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Rajdhani', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════════════════════════
       CANVAS
       ═══════════════════════════════════════════════════════════════ */
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════════════════════
       LOADING SCREEN
       ═══════════════════════════════════════════════════════════════ */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
        var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .loading-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--color-primary) 50%, var(--color-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.6)); }
    }

    .loading-spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loading-spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--color-primary);
      border-right-color: var(--color-secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-spinner-inner {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border: 2px solid transparent;
      border-bottom-color: var(--color-energy);
      border-left-color: var(--color-energy);
      border-radius: 50%;
      animation: spinReverse 1.5s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      to { transform: rotate(-360deg); }
    }

    .loading-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      animation: textPulse 1.5s ease-in-out infinite;
    }

    @keyframes textPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-progress {
      width: 240px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--color-primary);
    }

    /* ═══════════════════════════════════════════════════════════════
       PARTICLE OVERLAY (Ambient Effect)
       ═══════════════════════════════════════════════════════════════ */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--color-primary);
      border-radius: 50%;
      opacity: 0.4;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════════════════
       UTILITY CLASSES
       ═══════════════════════════════════════════════════════════════ */
    .glass-panel {
      background: rgba(10, 12, 22, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-card);
    }

    .glow-border {
      position: relative;
    }

    .glow-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════
       SCROLLBAR
       ═══════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

<style type="text/css" data-vite-dev-id="C:/Users/aubre/OneDrive/Documents/WORLDS STRONGEST/src/ui/styles/theme.css">:root {
  /* ── Shonen Fighter Font Stack ─────────────────────────────── */
  --ws-font-display: Impact, "Anton", "Black Han Sans", system-ui, sans-serif;
  --ws-font-body: "Barlow Condensed", "Rajdhani", system-ui, sans-serif;

  /* ── Shonen Palette ────────────────────────────────────────── */
  --ws-color-primary:   #ff6b00;   /* fiery orange – main energy          */
  --ws-color-secondary: #f7c501;   /* blazing yellow – power / impact      */
  --ws-color-energy:    #ff2d00;   /* deep red-orange – high damage        */
  --ws-color-success:   #00e676;   /* bright green – HP / safe             */
  --ws-color-warning:   #f7c501;   /* yellow – caution / stamina           */
  --ws-color-danger:    #ff1a1a;   /* bold red – critical / death          */
  --ws-color-gold:      #ffd700;   /* gold – power level / rank            */
  --ws-color-sky:       #38b6ff;   /* clear blue – ki / spirit             */
  --ws-color-impact:    #ffffff;   /* pure white – impact text             */

  /* ── Text ──────────────────────────────────────────────────── */
  --ws-text:        #ffffff;
  --ws-text-muted:  #cccccc;
  --ws-text-dim:    #888888;
  --ws-text-strong: #ffffff;

  /* ── Surfaces – solid blacks, not midnight blue ─────────────── */
  --ws-surface-page:        rgba(8, 8, 8,  0.99);
  --ws-surface-card:        rgba(14, 12, 10, 0.95);
  --ws-surface-card-alt:    rgba(10, 8,  6,  0.65);
  --ws-surface-panel:       rgba(18, 14, 10, 0.97);
  --ws-surface-panel-alt:   rgba(12, 9,  6,  0.96);
  --ws-surface-overlay:     rgba(4,  3,  2,  0.82);

  /* ── Borders – thick orange/black instead of subtle cyan ───── */
  --ws-border-subtle: rgba(255, 107,   0, 0.18);
  --ws-border-accent: rgba(255, 107,   0, 0.55);
  --ws-border-strong: rgba(247, 197,   1, 0.40);

  /* ── Radii – sharper, more angular ─────────────────────────── */
  --ws-radius-sm:   4px;
  --ws-radius-md:   6px;
  --ws-radius-lg:   8px;
  --ws-radius-xl:  12px;
  --ws-radius-pill: 999px;

  /* ── Spacing ────────────────────────────────────────────────── */
  --ws-space-xs:  8px;
  --ws-space-sm: 12px;
  --ws-space-md: 16px;
  --ws-space-lg: 24px;
  --ws-space-xl: 32px;
  --ws-space-2xl:40px;

  /* ── Shadows – warm orange glow, not cyan ───────────────────── */
  --ws-shadow-card:  0 25px 80px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.04);
  --ws-shadow-panel: 0 30px 80px rgba(0,0,0,0.75), 0 0 50px rgba(255,107,0,0.12);
  --ws-shadow-focus: 0 0 20px rgba(255,107,0,0.35);

  /* ── Transitions ────────────────────────────────────────────── */
  --ws-transition-fast:   150ms cubic-bezier(0.4, 0, 0.2, 1);
  --ws-transition-base:   250ms cubic-bezier(0.4, 0, 0.2, 1);
  --ws-transition-bounce: 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ── Animations ───────────────────────────────────────────────── */
@keyframes ws-fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes ws-slide-up {
  from { opacity: 0; transform: translateY(24px) skewY(-1deg); }
  to   { opacity: 1; transform: translateY(0)    skewY(0);     }
}

@keyframes ws-float {
  0%,100% { transform: translateY(0);     }
  50%     { transform: translateY(-16px); }
}

@keyframes ws-pulse {
  0%,100% { transform: scale(1);    opacity: 0.6; }
  50%     { transform: scale(1.08); opacity: 1;   }
}

/* Orange energy border pulse (replaces cyan border-glow) */
@keyframes ws-border-glow {
  0%,100% { box-shadow: 0 0 14px rgba(255,107,0,0.35), inset 0 0 14px rgba(255,107,0,0.08); }
  50%     { box-shadow: 0 0 32px rgba(255,107,0,0.65), inset 0 0 22px rgba(255,107,0,0.15); }
}

/* Impact flash (replaces chrome shine) */
@keyframes ws-impact-flash {
  0%   { box-shadow: inset 0   0 12px rgba(255,255,255,0.05); }
  40%  { box-shadow: inset 200px 0 24px rgba(255,200,0,0.22);  }
  100% { box-shadow: inset 600px 0 12px rgba(255,107,0,0.05);  }
}

/* Speedline sweep for panel BG accent */
@keyframes ws-speedline {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}
